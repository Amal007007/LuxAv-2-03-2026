<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Category Details</h4>
<!--                    <p class="card-description"> Add class <code>.table-striped</code></p>-->
                    <div class="table-responsive">
                      <table class="table table-striped">
                        <thead>
                          <tr>
                            <th> Category Name </th>
                            <th> Description </th>
                            <th> Category Image </th>
                            <th> Operations </th>
                          </tr>
                        </thead>
                        <tbody>
                         {% for i in categories %}
                        <tr>
                            <td>{{i.CategoryName}}</td>
                            <td>{{i.CategoryDescription}}</td>
                            <td>
                                <img src="{{i.CategoryImage.url}}" width="100px" alt="">
                            </td>
                            <td>
                                <a href="{% url 'edit_category' c_id=i.id%}" class="btn btn-outline-primary" style="width:100px; margin-bottom:5px;">Edit</a>
                            <a href="{% url 'delete_category' category_id=i.id %}" class="btn btn-outline-danger" style="width:100px;">Delete</a>
                            </td>
                        </tr>
                        {% endfor %}


                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>

</body>
</html>
{% endblock %}
