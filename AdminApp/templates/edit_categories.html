<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Edit Categories</h4>
<!--                    <p class="card-description"> Basic form elements </p>-->
                    <form class="forms-sample" method="post" action="{% url 'update_category' cat_id=c_data.id %}" enctype="multipart/form-data"  >
                        {% csrf_token %}
                      <div class="form-group">
                        <label for="exampleInputName1">Category Name</label>
                        <input type="text" name="category_name" class="form-control" id="exampleInputName1" placeholder="Category Name" required value="{{ c_data.CategoryName }}">
                      </div>
                      <div class="form-group">
                        <label for="exampleTextarea1">Description</label>
                        <textarea class="form-control" id="exampleTextarea1" name="category_description" placeholder="Description" rows="4" required>{{c_data.CategoryDescription}}</textarea>
                      </div>
                      <div class="form-group">
                        <label style="padding-bottom:10px;">Category Image</label><br>
                          <img src="{{ c_data.CategoryImage.url }}" width="150" style="padding-bottom:10px;">

                        <input type="file" name="category_image" class="form-control">
                      </div>

                      <button type="submit" class="btn btn-primary mr-2 mt-2">Submit</button>
<!--                      <button class="btn btn-dark">Cancel</button>-->
                    </form>
                  </div>
                </div>
              </div>

</body>
</html>
{% endblock %}
