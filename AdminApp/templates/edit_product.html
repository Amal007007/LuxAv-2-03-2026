<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Edit Products</h4>
<!--                    <p class="card-description"> Basic form elements </p>-->
                    <form class="forms-sample" method="post" action="{% url 'update_product' pro_id=p_data.id %}" enctype="multipart/form-data">
                        {% csrf_token %}
<!--                      <div class="form-group">-->
<!--                        <label for="exampleInputName1">Category Name</label>-->
<!--                        <input type="text" name="category_name" class="form-control" id="exampleInputName1" placeholder="Category Name" required>-->
<!--                      </div>-->
                    <div class="form-group">
                      <label for="grocery-categories">Select Grocery Category</label>
                      <select id="grocery-categories" name="p_category_name" class="form-control" style="width:100%">
                        {% for i in categories %}
                            <option value="{{ i.CategoryName }}"
                                {% if p_data.Category_Name == i.CategoryName %}selected{% endif %}>
                                {{ i.CategoryName }}
                            </option>
                        {% endfor %}
                     </select>

                    </div>
                       <div class="form-group">
                        <label for="exampleInputName2">Product Name</label>
                        <input type="text" name="product_name" class="form-control" id="exampleInputName2" placeholder="Product Name" required value="{{p_data.Product_Name}}">
                      </div>
                     <div class="form-group">
                        <label for="exampleInputName3">Price</label>
                        <input type="number" name="p_price" class="form-control" id="exampleInputName3" placeholder="Price" required value="{{p_data.Product_Price}}">
                      </div>
                      <div class="form-group">
                        <label for="exampleTextarea1">Description</label>
                        <textarea class="form-control" id="exampleTextarea1" name="p_description" placeholder="Description" rows="4" required>{{p_data.Product_Description}}</textarea>
                      </div>
                      <div class="form-group">
                        <label>Product Image</label><br>
                          <img src="{{ p_data.Product_Image.url }}" width="150" style="padding-bottom:10px;">

                        <input type="file" name="product_image" class="form-control">
                      </div>

                      <button type="submit" class="btn btn-primary mr-2">Submit</button>
<!--                      <button class="btn btn-dark">Cancel</button>-->
                    </form>
                  </div>
                </div>
              </div>

</body>
</html>
{% endblock %}
